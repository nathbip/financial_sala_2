name: Financial Data - Sala 2

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -B build -S cpp-engine/   

      - name: Build
        run: cmake --build build

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-engine
          path: build/         # your compiled output

  test-cpp:
    runs-on: ubuntu-latest
    needs: build-cpp           # waits for the build
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: cpp-engine
          path: build/

      - name: Grant execute permission
        run: chmod +x build/engine_tests

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

  test-python:
    runs-on: ubuntu-latest     # runs in PARALLEL with build-cpp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r python-validator/requirements.txt

      - name: Run Python tests
        run: pytest python-validator/tests/test_validate.py
        env:
          PYTHONPATH: python-validator